project:
  type: website
  output-dir: docs
  preview:
    port: 7778

website:
  title: "Notes on Reinforcement Learning"
  navbar:
    right:
      - about.qmd
      - icon: github
        href: https://github.com/
      - icon: twitter
        href: https://twitter.com
  site-url: https://orenbochman.github.io/notes-rl/
  description: Personal website, portfolio and blog
  repo-url: https://github.com/OrenBochman/notes-rl
  favicon: favicon.ico

date-format: full
date: last-modified
bibliography: references.bib 

format:
  html: 
    lightbox: true   
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    html-math-method: katex
    code-fold: true
    code-copy: true
    code-tools: 
      toggle: true
      source: false
    link-external-newwindow: true
    from: "markdown+emoji"
    include-in-header:
      text: |
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>

  # pdf:
  #   include-before-body:
  #     text: |
  #       \algrenewcommand{\algorithmiccomment}[1]{\hskip3em$\rightarrow$ #1}



execute:
  freeze: auto
  cache: true

filters:
  - pseudocode

pseudocode:
  caption-prefix: "Algorithm"
  reference-prefix: "Algorithm"
  caption-number: true
  caption-align: "left"
